# 예약 알림 — 일일 리포트(log_analyzer)에 due 도달한 항목을 포함시켜 발송.
#
# 형식:
#   - id: 고유 식별자 (중복 방지용, 필수)
#     due: YYYY-MM-DD (알림 시작일, 이 날짜부터 매일 리포트에 포함)
#     title: 한 줄 제목
#     body: |
#       여러 줄 설명 (선택)
#
# 해제: 알림을 더 이상 보고 싶지 않으면 해당 항목을 이 파일에서 삭제하고 커밋.
# 리마인더가 없으면 리포트에 알림 블록 자체가 출력되지 않음.

- id: cache-prebake-refactor
